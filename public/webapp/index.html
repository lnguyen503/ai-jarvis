<!doctype html>
<!--
  Jarvis Web App hub — v1.14.0

  CSP note (R12.6): NO inline JS is permitted. All script logic lives in the
  sibling app.js file. The Telegram WebApp SDK is loaded from the official CDN
  (telegram.org) which is explicitly allowed by the CSP script-src directive
  set in src/webapp/server.ts.

  Future inline scripts (if ever needed) must use a per-response CSP nonce
  generated by Express middleware — plain <script> tags without a nonce are
  blocked by strict CSP. Keep this page nonce-free.

  Auth note (R5): the page uses the Authorization: tma <initData> header only.
  The ?initData= query-string fallback is intentionally absent — it creates a
  24-hour phishing surface via browser history / referer leaks with zero gain.

  v1.14.0: hub conversion. The v1.13.0 ping-test skeleton is replaced by a
  feature-picker layout. The ping handler and Telegram.WebApp.sendData wiring
  are removed; see ADR 009 R12.3 + R5.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jarvis</title>
  <link rel="stylesheet" href="./styles.css">
  <!-- Telegram WebApp SDK from official CDN — allowed by CSP script-src -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <main id="main">
    <h1>Hello, <span id="greeting">…</span> <span id="bot-name-badge" class="bot-name-badge" hidden></span></h1>
    <p id="status">Initializing the Telegram WebApp SDK.</p>

    <div id="user-info" hidden>
      <p>Verified userId: <span id="user-id"></span></p>
    </div>

    <!-- v1.20.0 D20 — "Coach is on" hub banner (commit 15; expandable; dismissible) -->
    <!-- Using <details>/<summary> for native click-to-expand without inline JS (CSP-safe) -->
    <details id="coach-active-banner" class="coach-banner" hidden>
      <summary class="coach-banner-summary">
        <span class="coach-banner-icon">⚡</span>
        <span class="coach-banner-text" id="coach-banner-text">Coach Jarvis active — 1 profile</span>
        <button class="coach-banner-dismiss" id="coach-banner-dismiss" type="button">×</button>
      </summary>
      <!-- Expanded panel: per-profile schedule (populated by app.js) -->
      <div class="coach-banner-panel" id="coach-banner-panel">
        <ul class="coach-banner-profile-list" id="coach-banner-profile-list" aria-label="Active profiles">
          <!-- populated by initCoachBanner() -->
        </ul>
        <!-- Heavy-hammer: two-tap confirm before disabling all (ADR 020 D20) -->
        <div class="coach-banner-heavy-hammer">
          <button class="coach-banner-disable-all" id="coach-banner-disable-all" type="button">Disable everything</button>
          <button class="coach-banner-disable-confirm" id="coach-banner-disable-confirm" type="button" hidden>Confirm — disable all?</button>
        </div>
      </div>
    </details>

    <nav class="features" id="features" hidden>
      <a href="./organize/" class="feature-btn">
        <span class="feature-icon">📋</span>
        <span class="feature-label">Organize</span>
        <span class="feature-desc">Tasks, events, goals</span>
      </a>
      <!-- v1.16.0: Debate viewer added per ADR 016 D1 -->
      <a href="./debate/" class="feature-btn">
        <span class="feature-icon">🤔</span>
        <span class="feature-label">Debate</span>
        <span class="feature-desc">Live multi-model debates</span>
      </a>
      <!-- v1.17.0: Cron + Memory + Audit tiles (ADR 017 D1; R7 responsive layout) -->
      <a href="./cron/" class="feature-btn">
        <span class="feature-icon">🕐</span>
        <span class="feature-label">Cron</span>
        <span class="feature-desc">Scheduled tasks</span>
      </a>
      <a href="./memory/" class="feature-btn">
        <span class="feature-icon">🧠</span>
        <span class="feature-label">Memory</span>
        <span class="feature-desc">Personal memory</span>
      </a>
      <a href="./audit/" class="feature-btn">
        <span class="feature-icon">📜</span>
        <span class="feature-label">Audit</span>
        <span class="feature-desc">Activity log</span>
      </a>
    </nav>

    <p id="unauth-message" hidden>
      Open this from a <code>/webapp</code> button in Telegram.
    </p>
  </main>
</body>
</html>
